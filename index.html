        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.7);

            margin: 0;

        }

            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        main {

            margin: 0 auto;
            padding: 100px 20px;
            animation: fadeIn 1s ease-out;
        }
