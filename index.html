<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juris AI | Kostenlose Rechtsberatung</title>
    <style>
        /* EXTRA STABILER CODE - BITTE NICHTS ÄNDERN */
        body {
            background-color: #050505 !important;
            color: #ffffff !important;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            padding: 100px 20px;
            flex: 1;
        }
        h1 {
            color: #c5a059;
            font-size: 2rem;
            margin-bottom: 50px;
        }
        .input-box {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 8px;
        }
        input, textarea {
            width: 100%;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .btn {
            background: #c5a059;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        footer {
            padding: 40px;
            border-top: 1px solid #222;
        }
        a { color: #888; text-decoration: none; margin: 0 10px; font-size: 12px; }
    </style>
</head>
<body>
    <main>
        <h1>Sag mir, welche juristische Frage dich interessiert</h1>
        <div class="input-box">
            <form action="https://formspree.io/f/mbdpagwz" method="POST">
                <input type="email" name="email" placeholder="Deine E-Mail" required>
                <textarea name="frage" placeholder="Deine Frage..." rows="5" required></textarea>
                <button type="submit" class="btn">ANFRAGE ABSENDEN</button>
            </form>
        </div>
    </main>
    <footer>
        <a href="impressum.html">IMPRESSUM</a>
        <a href="datenschutz.html">DATENSCHUTZ</a>
    </footer>
</body>
</html>
