<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juris AI | Die Zukunft der Rechtsberatung</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.7);
            --gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.3);
            --text-main: #ffffff;
            --text-dim: #888888;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 80%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px;
            animation: fadeIn 1s ease-out;
        }

        .header-nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: flex-end;
            z-index: 100;
        }

        .login-btn {
            font-family: 'Montserrat', sans-serif;
            text-decoration: none;
            color: var(--gold);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1px solid var(--gold);
            padding: 10px 25px;
            border-radius: 2px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .hero-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            font-size: 2.2rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 60px;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 50px;
        }

        input[type="email"], textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: white;
            padding: 15px 0;
            margin-bottom: 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 200;
            font-size: 1rem;
            transition: border-color 0.4s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-bottom: 1px solid var(--gold);
        }

        .submit-btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            width: 100%;
            padding: 18px;
            font-size: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
        }

        .submit-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
            letter-spacing: 6px;
        }

        .dashboard {
            margin-top: 80px;
        }

        .dashboard h3 {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 25px;
            font-weight: 400;
        }

        .request-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid var(--border);
            opacity: 0.6;
            transition: 0.3s;
        }

        .request-item:hover {
            opacity: 1;
            background: rgba(255,255,255,0.02);
        }

        .gold-dot {
            width: 6px;
            height: 6px;
            background-color: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gold);
        }

        .footer-info {
            margin-top: 100px;
            border-top: 1px solid var(--border);
        }

        .accordion {
            background: transparent;
            border: none;
            color: var(--text-dim);
            width: 100%;
            text-align: left;
            padding: 25px 0;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: color 0.3s;
        }

        .accordion:hover { color: var(--gold); }

        .panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1);
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 200;
            line-height: 1.8;
            padding-bottom: 20px;
        }

        footer {
            margin-top: 50px;
            padding-bottom: 50px;
            text-align: center;
        }

        .footer-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 15px;
        }
