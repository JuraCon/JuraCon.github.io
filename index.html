    <style>
        /* Farbpalette & CSS Variablen */
        :root {
            --bg: #050505;
            --gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.3);
            --text: #ffffff;
            --dim: #888888;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        /* Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Globales Design */
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 80%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header & Navigation (Neu strukturiert für das Logo) --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between; /* Logo links, Button rechts */
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px); /* Subtiler Glas-Effekt */
        }

        /* Das neue Logo-Design */
        .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 200; /* Sehr dünn = sehr edel */
            font-size: 1.3rem;
            letter-spacing: 5px; /* Weite Laufweite */
            text-transform: uppercase;
            color: var(--gold);
            text-shadow: 0 0 10px var(--gold-glow); /* Subtiler Gold-Glow */
            text-decoration: none;
            transition: 0.3s;
        }

        .logo:hover {
            letter-spacing: 7px; /* Dynamischer Effekt beim Drüberfahren */
        }

        /* Der Account Button rechts */
        .btn-outline {
            color: var(--gold);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 1px solid var(--gold);
            padding: 8px 20px;
            transition: 0.3s;
        }

        .btn-outline:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold-glow); }

        /* Main Content */
        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 20px 60px 20px; /* Mehr Platz oben wegen der fixierten Nav */
            flex: 1;
            text-align: center;
        }

        /* Große Überschrift */
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 200;
            font-size: 1.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 50px;
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
